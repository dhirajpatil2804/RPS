<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .game-container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      width: 350px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .choices button {
      font-size: 30px;
      margin: 10px;
      padding: 15px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s;
      background: rgba(255,255,255,0.2);
    }

    .choices button:hover {
      transform: scale(1.2);
      background: rgba(255,255,255,0.4);
    }

    .choices button:active {
      transform: scale(0.9);
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.5s ease;
    }

    .result.show {
      opacity: 1;
      transform: scale(1);
    }

    .score {
      margin-top: 15px;
      font-size: 18px;
    }

    .thinking {
      animation: blink 0.6s infinite alternate;
    }

    @keyframes blink {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

  </style>
</head>
<body>

  <div class="game-container">
    <h1>✊✋✌️</h1>

    <div class="choices">
      <button onclick="play('rock')">✊</button>
      <button onclick="play('paper')">✋</button>
      <button onclick="play('scissors')">✌️</button>
    </div>

    <div id="result" class="result"></div>
    <div class="score" id="score">You: 0 | Computer: 0</div>
  </div>

  <script>
    let userScore = 0;
    let compScore = 0;

    function play(userChoice) {
      const resultDiv = document.getElementById("result");
      resultDiv.classList.remove("show");
      resultDiv.innerHTML = "<span class='thinking'>Computer is thinking...</span>";

      setTimeout(() => {
        const choices = ["rock", "paper", "scissors"];
        const compChoice = choices[Math.floor(Math.random() * 3)];

        let result = "";

        if (userChoice === compChoice) {
          result = "It's a Draw!";
        } else if (
          (userChoice === "rock" && compChoice === "scissors") ||
          (userChoice === "paper" && compChoice === "rock") ||
          (userChoice === "scissors" && compChoice === "paper")
        ) {
          result = "You Win! 🎉";
          userScore++;
        } else {
          result = "You Lose! 😢";
          compScore++;
        }

        resultDiv.innerHTML = `
          You chose ${userChoice} <br>
          Computer chose ${compChoice} <br><br>
          <strong>${result}</strong>
        `;

        resultDiv.classList.add("show");

        document.getElementById("score").innerText =
          `You: ${userScore} | Computer: ${compScore}`;
      }, 800);
    }
  </script>

</body>
</html>
